<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Захват мира</title>
    <style>
        body {
            background: #1a1a1a;
            color: #ccc;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            padding: 30px;
            margin: 0;
        }
        .game {
            width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .left-panel {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            text-align: center;
        }
        .country-icon {
            width: 200px;
            height: 150px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .country-name { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .country-index { font-size: 16px; }
        .hp-bar-outer {
            height: 30px;
            background: #222;
            border: 1px solid #333;
            margin: 15px 0;
        }
        .hp-bar-inner {
            height: 100%;
            background: #c0392b;
        }
        .hp-text { font-size: 18px; margin-bottom: 10px; }
        .click-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #1a0000;
            border: 3px solid #c0392b;
            color: #c0392b;
            font-size: 22px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin: 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.3;
        }
        .click-btn:active { background: #c0392b; color: #fff; transform: scale(0.95); }
        .click-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .resource-display { font-size: 20px; }
        .resource-display span { font-size: 24px; font-weight: bold; }
        .per-sec { font-size: 16px; margin-top: 5px; }
        .conquered-count { font-size: 16px; margin-top: 15px; }
        
        .right-panel {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
        }
        .upgrades-title { font-size: 18px; margin-bottom: 15px; }
        .upgrades-list {
            max-height: 650px;
            overflow-y: auto;
        }
        .upgrade {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 16px 18px;
            border: 1px solid #222;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .upgrade-icon {
            width: 200px;
            height: 200px;
            object-fit: contain;
            flex-shrink: 0;
            cursor: pointer;
            border: 1px solid #222;
            transition: border-color 0.2s;
            background: #0a0a0a;
        }
        .upgrade-icon:hover { border-color: #888; }
        .upgrade-info { flex: 1; }
        .upgrade-name { font-size: 16px; }
        .upgrade-desc { font-size: 13px; color: #888; }
        .upgrade button {
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: nowrap;
        }
        .upgrade button:hover { border-color: #888; }
        .upgrade button:disabled { opacity: 0.3; cursor: not-allowed; }
        .upgrade-locked {
            color: #555;
            font-size: 14px;
        }
        .question-icon {
            width: 200px;
            height: 200px;
            object-fit: contain;
            flex-shrink: 0;
            background: #0a0a0a;
            border: 1px solid #222;
        }
        
        .cheat-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 12px;
            font-size: 12px;
            display: none;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 10;
        }
        .cheat-panel.active { display: flex; }
        .cheat-panel input {
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            width: 140px;
        }
        .cheat-panel button {
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            padding: 6px 12px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .cheat-panel button:hover { border-color: #888; }
        .cheat-label { color: #555; font-size: 11px; }
        
        .password-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .password-overlay.active { display: flex; }
        .password-box {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            text-align: center;
            width: 350px;
        }
        .password-box h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #c0392b;
        }
        .password-box p {
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
        }
        .password-box input {
            width: 200px;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            margin-bottom: 15px;
        }
        .password-box button {
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            padding: 10px 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin: 3px;
        }
        .password-box button:hover { border-color: #888; }
        .password-error {
            color: #c0392b;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
        .password-error.active { display: block; }
        
        .secret-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #222;
            padding: 6px 12px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            z-index: 9;
        }
        .secret-btn:hover { color: #555; border-color: #555; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>

        <div class="right-panel">

            <div class="upgrades-list" id="upgradesList"></div>
        </div>
        
    </div>
    
    <button class="secret-btn" id="secretBtn" onclick="showPassword()">•••</button>
    
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-box">
            <h3>ДОСТУП К КОНСОЛИ</h3>
            <p>Введите код из 4 символов</p>
            <input type="password" id="passwordInput" maxlength="4" placeholder="****" onkeypress="if(event.key==='Enter')checkPassword()">
            <br>
            <button onclick="checkPassword()">Проверить</button>
            <button onclick="hidePassword()">Отмена</button>
            <div class="password-error" id="passwordError">Неверный код. Попробуйте ещё раз.</div>
        </div>
    </div>
    
    <div class="cheat-panel" id="cheatPanel">
        <span class="cheat-label">Консоль:</span>
        <input type="text" id="cheatInput" placeholder="Сколько мощи?" onkeypress="if(event.key==='Enter')addCheatPower()">
        <button onclick="addCheatPower()">Добавить</button>
        <button onclick="unlockOne()">Открыть +1</button>
        <button onclick="instaKill()">InstaKill</button>
    </div>

        ];
        
        var questionImg = 'https://i.imgur.com/3VY8qGk.png';
        
        function format(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(1) + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return Math.floor(num).toString();
        }
        
        function openImage(src) {
            window.open(src, '_blank');
        }
        
        function updateCountry() {
            document.getElementById('countryIcon').src = countries[currentCountryIndex].img;
            document.getElementById('countryName').textContent = countries[currentCountryIndex].name;
            document.getElementById('countryIndex').textContent = 'Страна ' + (currentCountryIndex + 1) + ' из ' + countries.length;
            document.getElementById('hpText').textContent = 'HP: ' + format(Math.ceil(currentHp)) + ' / ' + format(maxHp);
            document.getElementById('hpBar').style.width = (currentHp / maxHp * 100) + '%';
            document.getElementById('resourceDisplay').textContent = format(Math.floor(militaryPower));
            document.getElementById('clickPower').textContent = format(clickPower);
            document.getElementById('autoPower').textContent = autoPower % 1 === 0 ? format(autoPower) : autoPower.toFixed(1);
            document.getElementById('conqueredCount').textContent = 'Захвачено стран: ' + conqueredCount + ' / ' + countries.length;
        }
        
        function renderUpgrades() {
            var container = document.getElementById('upgradesList');
            container.innerHTML = '';
            
            for (var i = 0; i < upgrades.length; i++) {
                var div = document.createElement('div');
                div.className = 'upgrade';
                
                if (i < unlockedUpgrades) {
                    var u = upgrades[i];
                    div.innerHTML = 
                        '<img class="upgrade-icon" src="' + u.img + '" alt="иконка" onclick="openImage(\'' + u.img + '\')" title="Открыть в новой вкладке">' +
                        '<div class="upgrade-info">' +
                            '<div class="upgrade-name">' + u.name + 
                            (u.count > 0 ? ' ×' + u.count : '') + '</div>' +
                            '<div class="upgrade-desc">' + u.desc + '</div>' +
                        '</div>' +
                        '<button onclick="buyUpgrade(' + i + ')" ' + (militaryPower < u.cost ? 'disabled' : '') + '>' +
                            format(u.cost) + ' мощи' +
                        '</button>';
                } else {
                    div.innerHTML = 
                        '<img class="question-icon" src="https://static.vecteezy.com/system/resources/previews/056/613/374/non_2x/3d-red-question-mark-shape-query-symbol-punctuation-is-isolated-on-transparent-background-free-png.png" alt="закрыто">' +
                        '<div class="upgrade-info">' +
                            '<div class="upgrade-name">???' + '</div>' +
                            '<div class="upgrade-desc">Откроется позже</div>' +
                        '</div>' +
                        '<button disabled>???</button>';
                }
                
                container.appendChild(div);
            }
        }
        
        function buyUpgrade(index) {
            var u = upgrades[index];
            if (militaryPower < u.cost) return;
            militaryPower -= u.cost;
            u.count++;
            if (u.effect === 'click') clickPower += u.value;
            else autoPower += u.value;
            
            if (index + 1 === unlockedUpgrades && unlockedUpgrades < upgrades.length) {
                unlockedUpgrades++;
            }
            
            renderUpgrades();
            updateCountry();
        }
        
        function nextCountry() {
            conqueredCount++;
            currentCountryIndex++;
            if (currentCountryIndex >= countries.length) {
                document.getElementById('countryIcon').src = 'https://via.placeholder.com/200x150/111111/ffd700?text=WIN';
                document.getElementById('countryName').textContent = 'МИР ЗАХВАЧЕН!';
                document.getElementById('countryIndex').textContent = 'Все 20 стран повержены';
                document.getElementById('hpText').textContent = 'ПОБЕДА!';
                document.getElementById('clickBtn').disabled = true;
                document.getElementById('clickBtn').textContent = '✓';
                document.getElementById('conqueredCount').textContent = 'Захвачено стран: 20 / 20';
                updateCountry();
                return;
            }
            maxHp = countries[currentCountryIndex].hp;
            currentHp = maxHp;
            updateCountry();
        }
        
        // Пароль
        function showPassword() {
            document.getElementById('passwordOverlay').classList.add('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordError').classList.remove('active');
            setTimeout(function() {
                document.getElementById('passwordInput').focus();
            }, 100);
        }
        
        function hidePassword() {
            document.getElementById('passwordOverlay').classList.remove('active');
        }
        
        function checkPassword() {
            var input = document.getElementById('passwordInput').value;
            if (input === '5') {
                document.getElementById('passwordOverlay').classList.remove('active');
                document.getElementById('cheatPanel').classList.add('active');
                document.getElementById('secretBtn').style.display = 'none';
            } else {
                document.getElementById('passwordError').classList.add('active');
                document.getElementById('passwordInput').value = '';
            }
        }
        
        // Читы
        function addCheatPower() {
            var input = document.getElementById('cheatInput');
            var amount = parseInt(input.value);
            if (amount > 0) {
                militaryPower += amount;
                updateCountry();
                renderUpgrades();
                input.value = '';
            }
        }
        
        function unlockOne() {
            if (unlockedUpgrades < upgrades.length) {
                unlockedUpgrades++;
                renderUpgrades();
            }
        }
        
        function instaKill() {
            if (currentHp <= 0) return;
            currentHp = 0;
            nextCountry();
            renderUpgrades();
            updateCountry();
        }
        
        // Клик
        document.getElementById('clickBtn').addEventListener('click', function() {
            if (currentHp <= 0) return;
            currentHp -= clickPower;
            militaryPower += clickPower;
            if (currentHp <= 0) { currentHp = 0; nextCountry(); }
            renderUpgrades();
            updateCountry();
        });
        
        // Автодобыча
        setInterval(function() {
            if (autoPower > 0 && currentHp > 0) {
                var dps = autoPower / 10;
                currentHp -= dps;
                militaryPower += dps;
                if (currentHp <= 0) { currentHp = 0; nextCountry(); }
                updateCountry();
            }
        }, 100);
        
        updateCountry();
        renderUpgrades();
    </script>
